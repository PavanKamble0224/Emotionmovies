{% extends "base.html" %}

{% block title %}Register - MoodFlick{% endblock %}

{% block extra_css %}
<style>
.auth-container {
    max-width: 400px;
    margin: 3rem auto;
    padding: 2rem;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    backdrop-filter: blur(10px);
}

.auth-container h1 {
    text-align: center;
    margin-bottom: 2rem;
    font-size: 2rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: rgba(255, 255, 255, 0.7);
}

.form-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.05);
    color: white;
    outline: none;
    transition: border-color 0.3s;
}

.form-group input:focus {
    border-color: #667eea;
}

.auth-btn {
    width: 100%;
    padding: 1rem;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}

.auth-btn:hover {
    transform: scale(1.02);
}

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    color: rgba(255, 255, 255, 0.6);
}

.auth-footer a {
    color: #667eea;
    text-decoration: none;
}
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>📝 Register</h1>
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required minlength="3">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="6">
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirm" required>
        </div>
        <button type="submit" class="auth-btn">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
